schema_version = 1
name = "svcomp-initial"
source_repo = "https://gitlab.com/sosy-lab/benchmarking/sv-benchmarks.git"
source_commit = "ca46fe670b5dcbcd3495bd23689353a8ea1fb86b"
local_bundle_root = "vendor/sv-benchmarks"

[[benchmark]]
id = "validation_if"
category = "control-flow"
input_kind = "c"
path = "vendor/sv-benchmarks/c/validation-crafted/if.c"
task = "vendor/sv-benchmarks/c/validation-crafted/if.yml"
property = "unreach-call"
expected_verdict = "false"
line_count = 27
features = ["nondet", "if", "signed-add", "bad-state-call"]
notes = "Small branch-only reachability task with two nondeterministic integers."

[[benchmark]]
id = "validation_ternary"
category = "control-flow"
input_kind = "c"
path = "vendor/sv-benchmarks/c/validation-crafted/ternary.c"
task = "vendor/sv-benchmarks/c/validation-crafted/ternary.yml"
property = "unreach-call"
expected_verdict = "false"
line_count = 22
features = ["nondet", "conditional-expr", "if", "bad-state-call"]
notes = "Compact `?:` control-flow example with nested conditional expressions."

[[benchmark]]
id = "bitvector_implicitunsignedconversion_1"
